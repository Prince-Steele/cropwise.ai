<header class="app-header" role="banner">
  <div class="header-inner">
    <div class="header-brand">
      <button class="sidebar-toggle-btn" (click)="toggleMobileMenu()" aria-label="Toggle sidebar" aria-expanded="false">
        <i class="fa-solid fa-bars" aria-hidden="true"></i>
      </button>
      <img src="assets/image/cropwise-logo.png" alt="Cropwise" class="nav-logo-img" loading="eager" width="36" height="36">
      <span class="brand-text">Cropwise</span>
    </div>

    <div class="header-actions">
      <button type="button" class="header-logout-btn" (click)="logout()" aria-label="Log out of Cropwise">
        <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i>
        <span>Logout</span>
      </button>
      <a class="user-avatar" routerLink="/app/profile" role="button" aria-label="View your profile" tabindex="0">
        <img *ngIf="profileImage; else layoutAvatarIcon" [src]="profileImage" alt="Profile image" class="user-avatar-image">
        <ng-template #layoutAvatarIcon>
          <i class="fa-solid fa-user" aria-hidden="true"></i>
        </ng-template>
      </a>
    </div>
  </div>
</header>

<div class="app-shell">
  <aside class="sidebar" [class.sidebar-open]="isMobileMenuOpen" aria-label="Main navigation">
    <div class="sidebar-brand">
      <img src="assets/image/cropwise-logo.png" alt="Cropwise" class="nav-logo-img" width="36" height="36">
      <span class="brand-text">Cropwise</span>
    </div>

    <nav class="sidebar-nav" aria-label="App navigation">
      <a routerLink="/app/dashboard" routerLinkActive="active" (click)="closeMobileMenu()" class="sidebar-link">
        <span class="sidebar-icon"><i class="fa-solid fa-chart-column" aria-hidden="true"></i></span>
        <span class="sidebar-label">Dashboard</span>
      </a>
      <a routerLink="/app/advisor" routerLinkActive="active" (click)="closeMobileMenu()" class="sidebar-link">
        <span class="sidebar-icon"><i class="fa-solid fa-seedling" aria-hidden="true"></i></span>
        <span class="sidebar-label">Planting Advisor</span>
      </a>
      <a routerLink="/app/prediction" routerLinkActive="active" (click)="closeMobileMenu()" class="sidebar-link">
        <span class="sidebar-icon"><i class="fa-solid fa-chart-line" aria-hidden="true"></i></span>
        <span class="sidebar-label">Yield Prediction</span>
      </a>
      <a routerLink="/app/profile" routerLinkActive="active" (click)="closeMobileMenu()" class="sidebar-link">
        <span class="sidebar-icon"><i class="fa-solid fa-user" aria-hidden="true"></i></span>
        <span class="sidebar-label">Profile</span>
      </a>
    </nav>

    <button type="button" (click)="logout()" class="sidebar-link sidebar-logout" aria-label="Log out of Cropwise">
      <span class="sidebar-icon"><i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i></span>
      <span class="sidebar-label">Logout</span>
    </button>

    <div class="sidebar-footer-hint">
      <i class="fa-solid fa-leaf" aria-hidden="true"></i>
      <span>AI-Powered Crop Advisor</span>
    </div>
  </aside>

  <div class="sidebar-overlay" *ngIf="isMobileMenuOpen" (click)="closeMobileMenu()" aria-hidden="true"></div>

  <main class="page-content" id="main-content" role="main">
    <router-outlet></router-outlet>
  </main>
</div>

<app-footer></app-footer>
